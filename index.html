<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahasia Panda</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --matcha: #ccd5ae; --dark-leaf: #a4ac86; --panda-white: #ffffff;
            --panda-black: #333333; --blush: #ffafcc; --sky-blue: #e0f2fe;
            --warm-glow: rgba(255, 255, 190, 0.4); --paper: #fcfaf2;
            --bg-pattern-color: rgba(0, 0, 0, 0.03); 
            --letter-pattern-color: rgba(164, 172, 134, 0.06); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #f0ead2; font-family: 'Fredoka', sans-serif; overflow: hidden;
            transition: background 1s ease;
            background-image: 
                radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%),
                linear-gradient(30deg, var(--bg-pattern-color) 12%, transparent 12.5%, transparent 87%, var(--bg-pattern-color) 87.5%, var(--bg-pattern-color)),
                linear-gradient(150deg, var(--bg-pattern-color) 12%, transparent 12.5%, transparent 87%, var(--bg-pattern-color) 87.5%, var(--bg-pattern-color)),
                linear-gradient(60deg, rgba(255,255,255,0.1) 25%, transparent 25.5%, transparent 75%, rgba(255,255,255,0.1) 75.5%, rgba(255,255,255,0.1));
            background-size: 100% 100%, 40px 70px, 40px 70px, 40px 70px;
        }

        .dust-container { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .dust { position: absolute; width: 5px; height: 5px; background: white; border-radius: 50%; opacity: 0.3; animation: dustFloat 10s infinite linear; }
        @keyframes dustFloat {
            0% { transform: translateY(110vh) translateX(calc(100vw * var(--random-x-start))); opacity: 0; }
            100% { transform: translateY(-10vh) translateX(calc(100vw * var(--random-x-end))); opacity: 0; }
        }

        .stage { position: relative; width: 320px; height: 550px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #securityScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0ead2; z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .nose-btn { width: 50px; height: 50px; background: black; border-radius: 50%; margin: 20px auto; cursor: pointer; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .panda {
            position: relative; width: 110px; height: 90px; background: var(--panda-white); border-radius: 50% 50% 45% 45%; 
            box-shadow: 0 10px 0px rgba(0,0,0,0.05); transform: translateX(-200vw) rotate(-720deg); 
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: center; cursor: pointer; z-index: 20;
        }
        .ear { position: absolute; top: -10px; width: 30px; height: 30px; background: var(--panda-black); border-radius: 50%; }
        .ear.l { left: 0; } .ear.r { right: 0; }
        .eye-patch { position: absolute; top: 30px; width: 30px; height: 35px; background: var(--panda-black); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .eye-patch.l { left: 15px; transform: rotate(15deg); } .eye-patch.r { right: 15px; transform: rotate(-15deg); }
        .pupil { width: 8px; height: 8px; background: white; border-radius: 50%; }
        .nose { position: absolute; top: 55px; width: 10px; height: 6px; background: #000; border-radius: 50%; }
        .blush { position: absolute; top: 60px; width: 15px; height: 8px; background: var(--blush); border-radius: 50%; opacity: 0.5; }
        .blush.l { left: 25px; } .blush.r { right: 25px; }

        .letter {
            position: absolute; width: 290px; min-height: 420px; background: var(--paper); padding: 20px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; transform: scale(0); opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 15; border: 8px double var(--matcha); 
            display: flex; flex-direction: column; justify-content: center; overflow: hidden;
            background-image: radial-gradient(var(--letter-pattern-color) 1.5px, transparent 1.5px); background-size: 20px 20px;
        }
